services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://crm_user:crm_password@db:5432/crm_db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-in-production}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
